server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/copyforge}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    price-pro-monthly: ${STRIPE_PRICE_PRO_MONTHLY:price_pro_monthly}
    price-business-monthly: ${STRIPE_PRICE_BUSINESS_MONTHLY:price_business_monthly}
    success-url: ${STRIPE_SUCCESS_URL:https://copyforge.ai/dashboard?session_id={CHECKOUT_SESSION_ID}}
    cancel-url: ${STRIPE_CANCEL_URL:https://copyforge.ai/dashboard/pricing}

logging:
  level:
    com.copyforge: ${LOG_LEVEL:INFO}
    org.springframework: WARN
