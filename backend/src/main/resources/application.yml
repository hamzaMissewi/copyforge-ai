server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:copyforge}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

app:
  jwt:
    secret: ${JWT_SECRET:CopyForgeAI-SuperSecretKey-2024-Please-Change-In-Production-Minimum32Chars!!}
    expiration: ${JWT_EXPIRATION:86400000}
  gemini:
    api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

logging:
  level:
    com.copyforge: ${LOG_LEVEL:INFO}
