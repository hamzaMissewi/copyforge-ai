server:
    port: 8080

spring:
    datasource:
        url: jdbc:h2:mem:copyforge
        driver-class-name: org.h2.Driver
        username: sa
        password:
    h2:
        console:
            enabled: true
            path: /h2-console
    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: false
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.H2Dialect

app:
    jwt:
        secret: CopyForgeAI-SuperSecretKey-2024-Please-Change-In-Production-Minimum32Chars!!
        expiration: 86400000
    gemini:
        api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}
        model: gemini-2.0-flash
    stripe:
        secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
        webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

logging:
    level:
        com.copyforge: DEBUG
